<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">

  <style>
    text { font-family: Arial, sans-serif; fill: #ffffff; }
    .label { font-size: 12px; }
    .value { font-size: 14px; font-weight: bold; fill: #00ffcc; }
    .title { font-size: 16px; font-weight: bold; }
    .line { stroke: #888; stroke-width: 3; }
  </style>

  <!-- Fondo -->
  <rect width="900" height="420" fill="#0b0f1a"/>

  <!-- ================= PANEL SOLAR ================= -->
  <text class="title" x="80" y="40">Panel Solar</text>

  <rect x="50" y="60" width="180" height="120" fill="#1e3a5f" stroke="#00aaff" stroke-width="2"/>

  <!-- Celdas -->
  <g stroke="#00ccff" stroke-width="1">
    <line x1="50" y1="90" x2="230" y2="90"/>
    <line x1="50" y1="120" x2="230" y2="120"/>
    <line x1="50" y1="150" x2="230" y2="150"/>
    <line x1="80" y1="60" x2="80" y2="180"/>
    <line x1="110" y1="60" x2="110" y2="180"/>
    <line x1="140" y1="60" x2="140" y2="180"/>
    <line x1="170" y1="60" x2="170" y2="180"/>
    <line x1="200" y1="60" x2="200" y2="180"/>
  </g>

  <!-- Valores panel -->
  <text class="label" x="60" y="200">V:</text>
  <text class="value" id="PV_V" x="90" y="200">0</text>

  <text class="label" x="60" y="220">I:</text>
  <text class="value" id="PV_I" x="90" y="220">0</text>

  <text class="label" x="60" y="240">T:</text>
  <text class="value" id="PV_T" x="90" y="240">0</text>

  <text class="label" x="60" y="260">P:</text>
  <text class="value" id="PV_P" x="90" y="260">0</text>

  <!-- ================= BATERÍA ================= -->
  <text class="title" x="380" y="40">Batería</text>

  <!-- Cuerpo -->
  <rect x="350" y="80" width="120" height="60" fill="#333" stroke="#aaa" stroke-width="2"/>

  <!-- Terminal -->
  <rect x="470" y="95" width="10" height="30" fill="#aaa"/>

  <!-- Signos -->
  <text x="360" y="115">-</text>
  <text x="455" y="115">+</text>

  <!-- Indicador alarma temperatura -->
  <circle id="BAT_T_ALARM" cx="480" cy="80" r="6" fill="red"/>

  <!-- Valores batería -->
  <text class="label" x="350" y="170">V:</text>
  <text class="value" id="BAT_V" x="380" y="170">0</text>

  <text class="label" x="350" y="190">I:</text>
  <text class="value" id="BAT_I" x="380" y="190">0</text>

  <text class="label" x="350" y="210">P:</text>
  <text class="value" id="BAT_P" x="380" y="210">0</text>

  <text class="label" x="350" y="230">T:</text>
  <text class="value" id="BAT_T" x="380" y="230">0</text>

  <!-- ================= CARGA ================= -->
  <text class="title" x="700" y="40">Carga</text>

  <!-- Bombilla -->
  <circle cx="730" cy="110" r="30" fill="#222" stroke="#ffff00" stroke-width="2"/>
  <line x1="730" y1="140" x2="730" y2="170" stroke="#ffff00" stroke-width="3"/>
  <line x1="715" y1="170" x2="745" y2="170" stroke="#ffff00" stroke-width="3"/>
  <path d="M715 110 Q730 90 745 110" stroke="#ffff00" fill="none"/>

  <!-- Valores carga -->
  <text class="label" x="700" y="200">V:</text>
  <text class="value" id="LOAD_V" x="730" y="200">0</text>

  <text class="label" x="700" y="220">I:</text>
  <text class="value" id="LOAD_I" x="730" y="220">0</text>

  <text class="label" x="700" y="240">P:</text>
  <text class="value" id="LOAD_P" x="730" y="240">0</text>

  <!-- ================= CONEXIONES ================= -->
  <line class="line" x1="230" y1="120" x2="350" y2="110"/>
  <line class="line" x1="470" y1="110" x2="700" y2="110"/>

  <!-- ================= FLECHAS ================= -->
  <polygon id="FLOW_PV_LOAD" points="290,105 310,110 290,115" fill="#00ff00"/>
  <polygon id="FLOW_PV_BAT" points="320,105 340,110 320,115" fill="#00ff00"/>
  <polygon id="FLOW_BAT_LOAD" points="580,105 600,110 580,115" fill="#00ff00"/>

  <!-- ================= RESUMEN ================= -->
  <rect x="50" y="300" width="800" height="100" fill="#111" stroke="#444"/>

  <text class="title" x="60" y="290">Resumen del Sistema</text>

  <text class="label" x="70" y="330">P Panel:</text>
  <text class="value" id="TOTAL_PV" x="150" y="330">0</text>

  <text class="label" x="70" y="350">P Carga:</text>
  <text class="value" id="TOTAL_LOAD" x="150" y="350">0</text>

  <text class="label" x="70" y="370">P Batería:</text>
  <text class="value" id="TOTAL_BAT" x="150" y="370">0</text>

  <text class="label" x="500" y="350">Modo:</text>
  <text class="value" id="SYSTEM_MODE" x="560" y="350">IDLE</text>

</svg>
